defaults:
  request_timeout_seconds: 20
  min_anchor_text_length: 6
  max_anchor_text_length: 140
  user_agent: Mozilla/5.0 (X11; Linux x86_64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/124.0 Safari/537.36
sources:
  - id: thinkcontest-home
    name: Thinkgood Home
    kind: browseros_anchor_scan
    url: https://www.thinkcontest.com/
    enabled: true
    link_builder: thinkcontest_contest
    text_allow_patterns: [공모전, 경진대회, 대회, 숏폼, 영상, 아이디어, 데이터, AI, UCC, 제안, 슬로건, 명칭]
    text_deny_patterns: [회원가입, 공고등록, 수상작 갤러리, 전략&통계, 커뮤니티, 씽굿안내]
    source_bias: 8
    public_sector_bias: 4
    listing_limit: 8
    detail_limit: 4
    detail_fetch: browseros_detail
    load_wait_seconds: 3.0
    detail_wait_seconds: 3.5
  - id: wevity-all
    name: Wevity 전체 공모전
    kind: browseros_anchor_scan
    url: https://www.wevity.com/?c=find&s=1&gub=1
    enabled: true
    text_allow_patterns: [공모전, 경진대회, 대회, 숏폼, 영상, 아이디어, 데이터, AI, UCC, 창업]
    text_deny_patterns: [전체 공모전, 공모전전략, 공모전자료, 기획/아이디어, 영상/UCC/사진, 공모전 대외활동 콘테스트 메인메뉴]
    path_allow_patterns: [gbn=view]
    source_bias: 7
    public_sector_bias: 3
    listing_limit: 10
    detail_limit: 5
    detail_fetch: browseros_detail
    load_wait_seconds: 3.0
    detail_wait_seconds: 3.5
  - id: linkareer-contest
    name: Linkareer 공모전 목록
    kind: browseros_anchor_scan
    url: https://linkareer.com/list/contest
    enabled: true
    text_allow_patterns: [공모전, 경진대회, 대회, 숏폼, 영상, 아이디어, 데이터, AI, UCC, 창업, 해커톤]
    text_deny_patterns: [대외활동/교육/공모전, 대학생 필수, 인기 공모전, 공모전 한눈에 보기]
    path_allow_patterns: [/activity/]
    source_bias: 7
    public_sector_bias: 3
    listing_limit: 10
    detail_limit: 5
    detail_fetch: browseros_detail
    load_wait_seconds: 3.0
    detail_wait_seconds: 3.5
  - id: dacon-open
    name: DACON Open Competitions
    kind: browseros_anchor_scan
    url: https://www.dacon.io/competitions/open
    enabled: true
    text_allow_patterns: [대회, competition, 해커톤, AI, 데이터, 분석, 경진대회]
    text_deny_patterns: [로그인, 회원가입, 공지사항, 랭킹, 토론, 대회 참가 방법, 자주 묻는 대회 질문]
    path_allow_patterns: [/competitions/]
    path_deny_patterns: [/more/, /notice/, /rankings/, /talk/]
    source_bias: 6
    public_sector_bias: 1
    listing_limit: 8
    detail_limit: 4
    detail_fetch: browseros_detail
    load_wait_seconds: 3.5
    detail_wait_seconds: 3.5
  - id: kstartup-biz
    name: K-Startup 모집중
    kind: browseros_anchor_scan
    url: https://www.k-startup.go.kr/web/contents/bizpbanc-ongoing.do
    enabled: true
    text_allow_patterns: [공고, 창업, 지원사업, 아이디어, 혁신, 경진대회, 데모데이, 오디션]
    text_deny_patterns: [모집중, 창업지원사업 통합공고, 사업신청관리, 자주하는 질문, 창업길라잡이, 창업성공사례, 창업통계, 시스템 매뉴얼, 혁신창업생태계, 기업마당, 소상공인마당]
    path_deny_patterns: [webFSBIPBANC.do]
    source_bias: 6
    public_sector_bias: 5
    listing_limit: 8
    detail_limit: 4
    detail_fetch: browseros_detail
    load_wait_seconds: 3.5
    detail_wait_seconds: 4.0
  - id: thinkyou-contest
    name: Thinkyou 공모전
    kind: browseros_anchor_scan
    url: https://www.thinkyou.co.kr/contest/
    enabled: true
    text_allow_patterns: [공모전, 경진대회, 대회, 숏폼, 영상, 아이디어, 데이터, AI]
    text_deny_patterns: [공모전 대행안내, 공모전 무료 등록, 아이디어/마케팅, 이주의 주목할 공모전]
    source_bias: 5
    public_sector_bias: 2
    listing_limit: 6
    detail_limit: 3
    detail_fetch: browseros_detail
    load_wait_seconds: 3.5
    detail_wait_seconds: 3.5
    notes: BrowserOS DOM 기준으로 목록 파싱
  - id: contestkorea-all
    name: Contest Korea 전체 공모전
    kind: browseros_anchor_scan
    url: https://www.contestkorea.com/sub/list.php?int_gbn=1
    enabled: false
    text_allow_patterns: [공모전, 경진대회, 대회, 숏폼, 영상, 아이디어, 데이터, AI]
    text_deny_patterns: [대회·공모전, 전체 대회, 공모전 찾는 방법, 공모전 세금, 생활기록부]
    source_bias: 5
    public_sector_bias: 2
    listing_limit: 6
    detail_limit: 3
    detail_fetch: browseros_detail
    load_wait_seconds: 3.5
    detail_wait_seconds: 3.5
    notes: 메뉴 노이즈 제거를 위해 텍스트 deny rule 강화
  - id: sotong24-public
    name: 소통24 공모/수상작
    kind: browseros_anchor_scan
    url: https://sotong.go.kr/front/epilogue/epilogueNewListPage.do
    enabled: true
    text_allow_patterns: [공모, 정책, 제안, 수상작, 국민, 참여]
    text_deny_patterns: [로그인, 회원가입, 전체메뉴]
    source_bias: 9
    public_sector_bias: 6
    listing_limit: 8
    detail_limit: 4
    detail_fetch: browseros_detail
    load_wait_seconds: 4.0
    detail_wait_seconds: 4.0
    notes: BrowserOS로 connection reset 우회
  - id: seed-agency-template
    name: Seed Agency Notice Template
    kind: browseros_anchor_scan
    url: https://example.go.kr/notice
    enabled: false
    text_allow_patterns: [공모, 제안, 아이디어, 영상, UCC, 데이터, AI]
    text_deny_patterns: [공지, 일반]
    source_bias: 8
    public_sector_bias: 6
    listing_limit: 6
    detail_limit: 3
    detail_fetch: browseros_detail
    load_wait_seconds: 3.0
    detail_wait_seconds: 3.0
    notes: seed 기관별 원문 공지 URL을 복제해서 추가한다
